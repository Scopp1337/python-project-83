{% extends "layouts/base.html" %}

{% block title %}Анализатор страниц - Главная{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h1 class="display-3 text-center mb-4 text-dark fw-bold">
                    Анализатор страниц
                </h1>

                <p class="lead text-center text-muted mb-5">
                    Проверьте сайт на SEO-пригодность
                </p>

                <form action="{{ url_for('urls_index') }}" method="post" class="mt-5">
                    <div class="row justify-content-center g-3">
                        <div class="col-md-8">
                            <div class="input-group input-group-lg">
                                <input type="url"
                                       name="url"
                                       class="form-control form-control-lg border-2 shadow-sm"
                                       placeholder="https://www.example.com"
                                       required>
                            </div>
                        </div>
                        <div class="col-md-auto">
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow">
                                Проверить
                            </button>
                        </div>
                    </div>
                </form>

                <p class="text-center text-muted small mt-4">
                    Например: https://ru.hexlet.io, https://www.google.com
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
