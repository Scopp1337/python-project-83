{% extends "layouts/base.html" %}

{% block title %}Сайт: {{ url_info.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12">
        <h1 class="mb-4">Сайт: {{ url_info.name }}</h1>

        <div class="table-responsive">
            <table class="table table-bordered table-hover" data-test="url">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Дата создания</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>{{ url_info.id }}</td>
                        <td>{{ url_info.name }}</td>
                        <td>{{ url_info.created_at }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
